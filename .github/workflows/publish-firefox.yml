name: Publish Firefox Extension

on:
  push:
    branches: [main]
    paths:
      - 'packages/lorapok-atlas-firefox/**'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Sync latest API data
        run: cp lorapok-api-atlas/src/data/api_collection.json packages/lorapok-atlas-firefox/data/api_collection.json

      - name: Install web-ext
        run: npm install -g web-ext

      - name: Bump patch version
        id: bump
        working-directory: packages/lorapok-atlas-firefox
        run: |
          CURRENT=$(node -e "console.log(require('./manifest.json').version)")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
            m.version = '$NEW_VERSION';
            fs.writeFileSync('manifest.json', JSON.stringify(m, null, 2) + '\n');
          "
          echo "VERSION=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Bumped to $NEW_VERSION"

      - name: Build ZIP
        working-directory: packages/lorapok-atlas-firefox
        run: |
          VERSION=${{ steps.bump.outputs.VERSION }}
          zip -r lorapok-atlas-firefox-${VERSION}.zip \
            manifest.json popup.html popup.js popup.css data/ icons/ README.md
          echo "Built lorapok-atlas-firefox-${VERSION}.zip"

      - name: Sign & Submit to AMO
        working-directory: packages/lorapok-atlas-firefox
        run: |
          web-ext sign \
            --api-key="${{ secrets.AMO_API_KEY }}" \
            --api-secret="${{ secrets.AMO_API_SECRET }}" \
            --channel=listed \
            --source-dir=. \
            --artifacts-dir=./artifacts
        continue-on-error: true

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: lorapok-atlas-firefox-${{ steps.bump.outputs.VERSION }}
          path: packages/lorapok-atlas-firefox/lorapok-atlas-firefox-*.zip

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/lorapok-atlas-firefox/manifest.json \
                  packages/lorapok-atlas-firefox/lorapok-atlas-firefox-*.zip
          git diff --staged --quiet && echo "Nothing to commit" && exit 0
          git commit -m "chore(firefox): bump version to ${{ steps.bump.outputs.VERSION }}"
          git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:main
